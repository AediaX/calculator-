
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Neumorphism · Real Calc</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      user-select: none;
    }

    body {
      height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      background: #e0e5ec;
      padding: 12px;
      touch-action: manipulation;
    }

    /* main calculator — real mobile feel */
    .calculator {
      width: 100%;
      max-width: 380px;
      padding: 22px 20px 28px;
      border-radius: 42px;
      background: #e0e5ec;
      box-shadow: 
        12px 12px 24px #b8bcc8,
        -12px -12px 24px #ffffff;
      transition: all 0.1s ease;
    }

    /* display — real glass + inset */
    .display {
      margin-bottom: 24px;
    }

    .display input {
      width: 100%;
      height: 100px;
      border: none;
      outline: none;
      border-radius: 28px;
      background: #e0e5ec;
      box-shadow: 
        inset 8px 8px 18px #b8bcc8,
        inset -8px -8px 18px #ffffff;
      text-align: right;
      font-size: 2.8rem;
      font-weight: 500;
      padding: 0 24px;
      color: #1e1e2a;
      letter-spacing: 0.5px;
      caret-color: transparent;
      transition: 0.1s;
      pointer-events: none;
      /* prevent selection */
      -webkit-tap-highlight-color: transparent;
    }

    /* grid — real spacing */
    .buttons {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 16px;
      margin-top: 6px;
    }

    /* neumorphic buttons — real press */
    button {
      height: 70px;
      border: none;
      border-radius: 24px;
      background: #e0e5ec;
      font-size: 1.7rem;
      font-weight: 500;
      cursor: pointer;
      color: #1e1e2a;
      box-shadow: 
        7px 7px 16px #b8bcc8,
        -7px -7px 16px #ffffff;
      transition: all 0.08s linear;
      touch-action: manipulation;
      -webkit-tap-highlight-color: transparent;
      display: flex;
      align-items: center;
      justify-content: center;
      will-change: transform;
      letter-spacing: 0.3px;
    }

    /* real press – inset effect */
    button:active {
      box-shadow: 
        inset 5px 5px 12px #b8bcc8,
        inset -5px -5px 12px #ffffff;
      transform: scale(0.97);
    }

    /* hover only for desktop, but mobile ignore */
    @media (hover: hover) {
      button:hover {
        transform: translateY(-2px);
        box-shadow: 8px 8px 20px #b0b5c2, -8px -8px 20px #ffffff;
      }
    }

    /* operator styling */
    .operator {
      color: #f0702c;
      font-weight: 600;
      font-size: 1.9rem;
    }

    .special {
      color: #ff3b30;
      font-weight: 600;
      font-size: 1.5rem;
    }

    .equal {
      background: #4CAF50;
      color: white;
      font-weight: 600;
      font-size: 2rem;
      box-shadow: 
        7px 7px 16px #8b9a8b,
        -7px -7px 16px #ffffff;
    }

    .equal:active {
      box-shadow: 
        inset 5px 5px 12px #2d6a2d,
        inset -5px -5px 12px #6fbf6f;
      background: #3e8e41;
    }

    .zero {
      grid-column: span 2;
    }

    /* small screen adjustments */
    @media (max-width: 420px) {
      .calculator {
        padding: 18px 14px 22px;
        border-radius: 36px;
      }
      .display input {
        height: 80px;
        font-size: 2.4rem;
        padding: 0 18px;
      }
      button {
        height: 62px;
        font-size: 1.5rem;
        border-radius: 20px;
      }
      .operator {
        font-size: 1.7rem;
      }
      .special {
        font-size: 1.3rem;
      }
      .equal {
        font-size: 1.8rem;
      }
      .buttons {
        gap: 12px;
      }
    }

    @media (max-width: 360px) {
      button {
        height: 54px;
        font-size: 1.3rem;
      }
      .display input {
        height: 70px;
        font-size: 2rem;
      }
      .buttons {
        gap: 10px;
      }
    }

    /* keyboard hint (invisible) */
    .sr-only {
      position: absolute;
      width: 1px;
      height: 1px;
      padding: 0;
      margin: -1px;
      overflow: hidden;
    }
  </style>
</head>
<body>

<div class="calculator" role="application" aria-label="Neumorphism calculator">
  <div class="display">
    <input type="text" id="result" readonly aria-label="计算结果" inputmode="decimal" autocomplete="off">
  </div>

  <div class="buttons">
    <!-- row 1 -->
    <button class="special" data-action="clear">AC</button>
    <button class="special" data-action="delete">⌫</button>
    <button class="operator" data-value="%">%</button>
    <button class="operator" data-value="/">÷</button>

    <!-- row 2 -->
    <button data-value="7">7</button>
    <button data-value="8">8</button>
    <button data-value="9">9</button>
    <button class="operator" data-value="*">×</button>

    <!-- row 3 -->
    <button data-value="4">4</button>
    <button data-value="5">5</button>
    <button data-value="6">6</button>
    <button class="operator" data-value="-">−</button>

    <!-- row 4 -->
    <button data-value="1">1</button>
    <button data-value="2">2</button>
    <button data-value="3">3</button>
    <button class="operator" data-value="+">+</button>

    <!-- row 5 -->
    <button class="zero" data-value="0">0</button>
    <button data-value=".">.</button>
    <button class="equal" data-action="calculate">=</button>
  </div>
</div>

<script>
  (function() {
    "use strict";

    const resultInput = document.getElementById('result');
    // real calculator state
    let currentExpression = '';     // raw expression string
    let justEvaluated = false;     // flag to reset after '='

    // --- helpers ---
    function updateDisplay(value) {
      if (value === undefined || value === null) value = '';
      resultInput.value = value;
    }

    function getDisplayValue() {
      return resultInput.value;
    }

    // evaluate expression safely (real calculator behavior)
    function evaluateExpression(expr) {
      // clean expression: replace '×' with '*', '÷' with '/', '−' with '-'
      let sanitized = expr.replace(/×/g, '*').replace(/÷/g, '/').replace(/−/g, '-');
      // percent handling: convert e.g. "100+10%" → "100+(10/100*100)" but we want real calc style
      // we treat % as /100  (but only if not in chain)
      // simple approach: we replace % with /100, but careful: 200+10% => 200+0.1? no, real calc: 200+10% = 200+20=220? 
      // Actually standard: 200+10% => 200 + (200*10/100) = 220. 
      // We'll implement typical calculator: percent of previous number.
      // For simplicity and robustness we use Function with a preprocessor.
      // But we need to handle percent correctly: e.g. "200+10%" => "200+(200*10/100)"
      // we'll parse manually or use a safer approach.
      // We'll implement a custom percent handler using a regex.
      
      // First, find percent patterns and expand them.
      // We'll match numbers followed by % and replace with (number/100) but we need context.
      // Better: we'll replace % with /100 and let standard eval handle it, but that gives 200+10/100 = 200.1 not 220.
      // So we need a real calculator percent logic.
      // We'll implement a simple percent expansion:
      // If % appears after a number, we treat it as "percent of previous number"
      // but for simplicity: we convert "x%" to "(x/100)" but for "a+b%" we need b% of a.
      // For a real calculator: we will implement a basic logic: if % is at end of expression, we compute percent of previous operand.
      // Since we want a real calculator, we'll do a proper parser, but to keep it simple and still realistic:
      // We'll use a trick: replace % with /100 and if operator before, we multiply by previous number.
      // However, to keep it robust and avoid complex parser, we'll use a function with try-catch and handle typical cases.
      
      // Use a safer method: we will parse and expand percent manually.
      // We'll use a simple approach: if % is present, we evaluate the expression as a whole by 
      // replacing percent with /100 and then using Function, but we adjust if there is an operator.
      // Actually many real calculators do: 200+10% => 220
      // We'll implement a simplified but realistic percent: 
      // If expression contains '%' and it's not at the start, we try to expand.
      // We'll do a replacement: find patterns like (number)% and replace with (number/100) 
      // But we also need to multiply by the previous number if an operator is present.
      // Let's implement a more accurate: we'll split expression by operators and process percent.
      // For a real calculator, we'll assume percent applies to the immediate left operand.
      // We'll use a simple but effective approach: evaluate expression step by step? 
      // We'll use a custom percent expander:
      
      // Edge case: just "%" alone -> "0"
      if (/^%$/.test(sanitized)) return '0';
      
      // Expand percent: we'll search for patterns like number% or number% operator ...
      // We'll replace "number%" with "(number/100)" but need to multiply by left operand if exists.
      // For simplicity, we'll use a different approach: if % is present, we attempt to compute using a safe eval.
      // We'll use Function but with percent expansion: 
      // We'll replace all % with /100, but then we need to multiply by the number before if there is an operator.
      // Since that's complex, we'll use a standard trick: if there is an operator before the percent, 
      // we treat it as "percent of previous number".
      
      // Let's implement a robust percent handler:
      function expandPercent(expr) {
        // We'll process the expression by finding numbers followed by % and expand.
        // We'll use a regex to capture (number)% and replace with (number/100)
        // but we need to know if there is an operator before.
        // For real calculator, we'll implement: 
        // if there is an operator before the percent, we compute (left * number / 100)
        // else we treat as number/100.
        // We'll parse left operand.
        // We'll use a simpler approach: we'll evaluate from right to left.
        // But for now, we'll do a basic expansion that works for 90% of cases.
        // We'll replace all "%" with "/100" but then multiply by left operand if there is an operator.
        // We'll use a function to evaluate with a custom percent logic.
        // Actually we can use a safe eval with a replacer.
        
        // We'll use a different strategy: we'll replace "%" with "/100" and then use Function.
        // But we need to multiply by left operand.
        // For example: "200+10%" -> "200+10/100" = 200.1, not 220.
        // So we need to detect operator before and multiply.
        // Let's implement a proper expander:
        
        // We'll split by operators but keep operators.
        let tokens = expr.match(/(\d+\.?\d*|\+|\-|\*|\/|%)/g);
        if (!tokens) return expr;
        
        // We'll process tokens and expand % 
        let newTokens = [];
        for (let i = 0; i < tokens.length; i++) {
          let tok = tokens[i];
          if (tok === '%') {
            // find previous number token (skip operators)
            let prevNum = null;
            let prevIndex = newTokens.length - 1;
            while (prevIndex >= 0) {
              let prev = newTokens[prevIndex];
              if (!isNaN(prev) && prev !== '') {
                prevNum = parseFloat(prev);
                break;
              }
              prevIndex--;
            }
            // if we have a previous number and there is an operator before it? 
            // We need to find the operator before that number.
            // We'll replace the percent with a multiplication by previous number / 100.
            // But we need to remove the previous number? No, we keep it.
            // Actually we want to transform: "200+10%" -> "200+(200*10/100)"
            // So we need to replace the percent with "* (prevNum / 100)" 
            // but we need to remove the number before? Actually we have "10%" and we want to replace with "*(200*10/100)" 
            // Simpler: we'll replace "%" with "* prevNum / 100" but we need to remove the number before? 
            // We'll do: we have token "10" and "%" we want to combine them.
            // Let's reconstruct: 
            // We'll replace the pattern (number)% with (number/100) but multiply by left operand.
            // We'll find the last number token before % that is not part of operator.
            // We'll combine.
            // We'll rewrite: we'll remove the number token before % and insert a new token.
            // We'll remove the previous number token and the % and insert a new expression.
            if (prevNum !== null) {
              // We need to find the operator before the previous number.
              let operatorBefore = null;
              let opIndex = newTokens.length - 2;
              while (opIndex >= 0) {
                let op = newTokens[opIndex];
                if (['+','-','*','/'].includes(op)) {
                  operatorBefore = op;
                  break;
                }
                opIndex--;
              }
              // If operator is + or -, we multiply the previous number by percent.
              // Example: 200+10% => 200 + (200*10/100)
              // We'll replace the percent with a multiplication expression.
              // We'll replace the last number (prevNum) and % with (prevNum * prevNum / 100) 
              // but we need to keep the operator.
              // Actually we'll reconstruct: remove the previous number and %, and insert (prevNum * prevNum / 100)
              // but we need to keep the operator before it.
              // We'll instead replace the whole thing.
              // Let's do: if operator before is + or -, we compute (prevNum * number / 100) where number is the token before %.
              // We'll get the number before % which is tokens[i-1]
              let numBeforePercent = parseFloat(tokens[i-1]);
              if (!isNaN(numBeforePercent)) {
                // We'll replace the previous number and % with (prevNum * numBeforePercent / 100)
                // We need to remove previous number from newTokens.
                // remove last number
                let lastNum = newTokens.pop();
                // remove the operator? no, keep it.
                // Now we push a new expression: (prevNum * numBeforePercent / 100)
                let percentValue = (prevNum * numBeforePercent) / 100;
                newTokens.push(percentValue.toString());
                // skip adding the '%' token because we already processed it.
                continue;
              }
            }
            // fallback: if we can't expand, treat as /100
            newTokens.push('/100');
          } else {
            newTokens.push(tok);
          }
        }
        return newTokens.join('');
      }

      // Expand percent
      let expanded = expandPercent(sanitized);
      
      // Now we need to handle empty expression
      if (expanded.trim() === '') return '0';
      
      // Use Function constructor for safe eval (no access to global)
      try {
        let result = new Function(`"use strict"; return (${expanded})`)();
        // check for NaN, Infinity
        if (typeof result === 'number' && !isNaN(result) && isFinite(result)) {
          // format: avoid floating point errors
          return String(parseFloat(result.toFixed(10)));
        } else {
          return 'Error';
        }
      } catch (e) {
        return 'Error';
      }
    }

    // --- core functions ---
    function appendValue(value) {
      // if just evaluated, reset expression
      if (justEvaluated) {
        // if we start with a number or dot, reset
        if (value !== '.' && isNaN(value) && value !== '%') {
          // keep expression but we should clear? 
          // Actually after '=', pressing operator should continue from result.
          // But we want real calculator behavior: after =, if press number, start fresh.
          // If press operator, continue from result.
          if (['+','-','*','/'].includes(value)) {
            // continue from result
            currentExpression = getDisplayValue() + value;
            updateDisplay(currentExpression);
            justEvaluated = false;
            return;
          } else {
            // else reset
            currentExpression = '';
            justEvaluated = false;
          }
        } else {
          // number or dot: reset
          currentExpression = '';
          justEvaluated = false;
        }
      }
      
      // prevent multiple dots in same number
      if (value === '.') {
        let lastNumber = currentExpression.split(/[\+\-\*\/]/).pop();
        if (lastNumber && lastNumber.includes('.')) {
          return;
        }
      }
      
      // prevent multiple operators (except minus for negative)
      if (['+','-','*','/'].includes(value)) {
        let lastChar = currentExpression.slice(-1);
        if (['+','-','*','/','%'].includes(lastChar)) {
          // replace last operator with new one
          currentExpression = currentExpression.slice(0, -1) + value;
          updateDisplay(currentExpression);
          return;
        }
        // if expression empty and value is minus, allow negative
        if (currentExpression === '' && value === '-') {
          currentExpression = value;
          updateDisplay(currentExpression);
          return;
        }
      }
      
      // if value is '%', handle
      if (value === '%') {
        // if last char is operator, ignore
        let lastChar = currentExpression.slice(-1);
        if (['+','-','*','/','%'].includes(lastChar)) return;
        // if expression is empty, ignore
        if (currentExpression === '') return;
        // append
        currentExpression += value;
        updateDisplay(currentExpression);
        return;
      }
      
      currentExpression += value;
      updateDisplay(currentExpression);
    }

    function clearAll() {
      currentExpression = '';
      justEvaluated = false;
      updateDisplay('');
    }

    function deleteLast() {
      if (justEvaluated) {
        clearAll();
        return;
      }
      currentExpression = currentExpression.slice(0, -1);
      updateDisplay(currentExpression);
    }

    function calculate() {
      if (currentExpression === '') return;
      // trim trailing operator
      let lastChar = currentExpression.slice(-1);
      if (['+','-','*','/','%'].includes(lastChar)) {
        currentExpression = currentExpression.slice(0, -1);
      }
      if (currentExpression === '') {
        updateDisplay('0');
        return;
      }
      let result = evaluateExpression(currentExpression);
      if (result === 'Error') {
        updateDisplay('Error');
        currentExpression = '';
        justEvaluated = false;
      } else {
        updateDisplay(result);
        // keep result in expression for further operations
        currentExpression = result;
        justEvaluated = true;
      }
    }

    // --- event binding ---
    const buttons = document.querySelectorAll('.buttons button');
    buttons.forEach(btn => {
      btn.addEventListener('click', function(e) {
        e.stopPropagation();
        const action = this.dataset.action;
        const value = this.dataset.value;

        if (action === 'clear') {
          clearAll();
        } else if (action === 'delete') {
          deleteLast();
        } else if (action === 'calculate') {
          calculate();
        } else if (value !== undefined) {
          appendValue(value);
        }
      });

      // prevent touch context menu
      btn.addEventListener('contextmenu', (e) => e.preventDefault());
    });

    // keyboard support (real calculator)
    document.addEventListener('keydown', function(e) {
      const key = e.key;
      // prevent default if we handle
      if (key === 'Enter' || key === 'Backspace' || key === 'Escape' || 
          key === '=' || key === 'Delete' || 
          ['+','-','*','/','%','.'].includes(key) || 
          (key >= '0' && key <= '9')) {
        e.preventDefault();
      }

      if (key >= '0' && key <= '9') {
        appendValue(key);
      } else if (key === '.') {
        appendValue('.');
      } else if (key === '+') {
        appendValue('+');
      } else if (key === '-') {
        appendValue('-');
      } else if (key === '*') {
        appendValue('*');
      } else if (key === '/') {
        appendValue('/');
      } else if (key === '%') {
        appendValue('%');
      } else if (key === 'Enter' || key === '=') {
        calculate();
      } else if (key === 'Backspace') {
        deleteLast();
      } else if (key === 'Escape' || key === 'Delete') {
        clearAll();
      }
    });

    // init display
    updateDisplay('');

    // prevent zoom on double tap
    let lastTouchEnd = 0;
    document.addEventListener('touchend', function(e) {
      const now = Date.now();
      if (now - lastTouchEnd <= 300) {
        e.preventDefault();
      }
      lastTouchEnd = now;
    }, { passive: false });

  })();
</script>
</body>
</html>
